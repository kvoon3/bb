packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  '@types/node': ^26.0.0
  typescript: ^6.0.3
  tsx: ^4.22.4
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vite-plus: 0.2.1
  bumpp: ^11.1.0
  changelogithub: ^14.0.0
overrides:
  vite: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: '*'
minimumReleaseAgeExclude:
  - '@types/node@25.9.3'
allowBuilds:
  esbuild: true
