name: Release Extension

permissions:
  contents: write

on:
  push:
    tags:
      - 'extension-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.3

      - name: Set node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build shared package
        run: pnpm --filter @bb/shared build

      - name: Build extension
        run: pnpm -C apps/extension build

      - name: Package extension
        working-directory: apps/extension
        run: zip -r "extension-$(node -p 'require("./package.json").version').zip" dist

      - name: Generate changelog and release
        working-directory: apps/extension
        run: npx changelogithub --to ${{ github.ref_name }} --assets 'extension-*.zip'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
